plugins {
    id 'com.android.application'
}

android {
    namespace 'com.platequest.app'
    compileSdk 36

    defaultConfig {
        applicationId 'com.platequest.app'
        minSdk 26
        targetSdk 36
        versionCode 4
        versionName '1.2.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
